name: Release

# 推送 v* 标签(如 v1.0.0)时:构建 macOS 桌面 App + .dmg + .pkg,
# 并把产物挂到对应的 GitHub Release。
on:
  push:
    tags:
      - "v*"
  # 手动触发:在 Actions 页面点 "Run workflow"。
  # 默认只构建并上传 CI 产物,不发布 Release;勾选 publish_release 才建 Release。
  workflow_dispatch:
    inputs:
      publish_release:
        description: "构建后是否创建 GitHub Release(默认否,仅产出 CI 附件)"
        type: boolean
        default: false

# 允许 workflow 用 GITHUB_TOKEN 创建 Release / 上传附件
permissions:
  contents: write

jobs:
  build-macos:
    # Apple Silicon runner;GrowGuard 依赖 macOS 原生工具(lsappinfo/pfctl/osascript)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 校验 tag 版本与 tauri.conf.json 一致(防止漏改版本号);手动触发跳过 ---
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: bash scripts/ci/verify-version.sh

      # --- 工具链:Rust + tauri-cli + Node/pnpm ---
      # 通用二进制需同时具备 x86_64 与 aarch64 两个目标
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      # --- 构建:.app + .dmg + .pkg + dist/ 分发包 ---
      # build.sh 默认打 .dmg,--pkg 额外出引导安装包
      - name: Build (app + dmg + pkg)
        run: bash scripts/build.sh --pkg

      # --- 归集产物,统一改成 ASCII 文件名便于下载(产品名含中文"青锁盾")---
      - name: Collect artifacts
        id: collect
        run: bash scripts/ci/collect-artifacts.sh

      - name: Upload build artifacts (CI)
        uses: actions/upload-artifact@v4
        with:
          name: growguard-macos
          path: release-artifacts/*
          if-no-files-found: error

      # --- git-cliff:从 Conventional Commits 生成本版 changelog ---
      # content 用于 Release 正文;同时把完整 CHANGELOG.md 写回仓库(仅 tag 触发)。
      - name: Generate changelog (release notes)
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md in repo
        # 仅 tag 触发时回写完整 CHANGELOG.md 到默认分支(手动触发不污染仓库)
        if: startsWith(github.ref, 'refs/tags/')
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md back to main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md 无变化,跳过提交"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "${GITHUB_REF#refs/tags/}" || true
          git checkout -B main
          git add CHANGELOG.md
          git commit -m "chore(release): 更新 CHANGELOG 至 ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      # --- 创建/更新 Release 并挂附件 ---
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          # tag 触发用触发的 tag;手动触发用 tauri.conf.json 版本组成的 v<版本>
          tag_name: v${{ steps.collect.outputs.version }}
          name: v${{ steps.collect.outputs.version }}
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(steps.collect.outputs.version, '-') }}
          # 用 git-cliff 生成的分类 changelog,不再叠加 GitHub 内置 notes
          generate_release_notes: false
          body: |
            ## 更新内容

            ${{ steps.changelog.outputs.content }}

            ## 安装

            **未签名版本** —— 首次打开会被 macOS Gatekeeper 拦截,右键点 App 选「打开」即可放行(或在「系统设置 → 隐私与安全性」点「仍要打开」)。

            | 产物 | 说明 |
            |------|------|
            | `GrowGuard-*.pkg` | **推荐**。双击引导安装 App + CLI + 后端;装完运行 `sudo grow-guard install` 起守护进程 |
            | `GrowGuard-*.dmg` | 仅桌面 App,拖拽到「应用程序」;CLI/守护需另装 |
            | `GrowGuard-*-app.zip` | `.app` 压缩包(dmg 兜底) |

            详见仓库内 [`docs/INSTALL.md`](${{ github.server_url }}/${{ github.repository }}/blob/v${{ steps.collect.outputs.version }}/docs/INSTALL.md)。
