name: Release

# 推送 v* 标签(如 v1.0.0)时:构建 macOS 桌面 App + .dmg + .pkg,
# 并把产物挂到对应的 GitHub Release。
on:
  push:
    tags:
      - "v*"
  # 手动触发:在 Actions 页面点 "Run workflow"。
  # 默认只构建并上传 CI 产物,不发布 Release;勾选 publish_release 才建 Release。
  workflow_dispatch:
    inputs:
      publish_release:
        description: "构建后是否创建 GitHub Release(默认否,仅产出 CI 附件)"
        type: boolean
        default: false

# 允许 workflow 用 GITHUB_TOKEN 创建 Release / 上传附件
permissions:
  contents: write

jobs:
  build-macos:
    # Apple Silicon runner;GrowGuard 依赖 macOS 原生工具(lsappinfo/pfctl/osascript)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- 校验 tag 版本与 tauri.conf.json 一致(防止漏改版本号);手动触发跳过 ---
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CONF_VER="$(grep -m1 '"version"' desktop/src-tauri/tauri.conf.json | sed -E 's/.*"([0-9.]+)".*/\1/')"
          echo "tag=$TAG  tauri.conf.json=$CONF_VER"
          if [ "$TAG" != "$CONF_VER" ]; then
            echo "::error::标签 v$TAG 与 tauri.conf.json 的 version($CONF_VER)不一致,请先同步版本号"
            exit 1
          fi

      # --- 工具链:Rust + tauri-cli + Node/pnpm ---
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      # --- 构建:.app + .dmg + .pkg + dist/ 分发包 ---
      # build.sh 默认打 .dmg,--pkg 额外出引导安装包
      - name: Build (app + dmg + pkg)
        run: bash scripts/build.sh --pkg

      # --- 归集产物,统一改成 ASCII 文件名便于下载(产品名含中文"青锁盾")---
      - name: Collect artifacts
        id: collect
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep -m1 '"version"' desktop/src-tauri/tauri.conf.json | sed -E 's/.*"([0-9.]+)".*/\1/')"
          fi
          OUT="release-artifacts"
          mkdir -p "$OUT"
          BUNDLE="desktop/src-tauri/target/release/bundle"

          # .pkg(build.sh 已按 ASCII 命名 GrowGuard-<版本>.pkg)
          if [ -f "dist/GrowGuard-${VERSION}.pkg" ]; then
            cp "dist/GrowGuard-${VERSION}.pkg" "$OUT/GrowGuard-${VERSION}.pkg"
          fi

          # .dmg(产品名为中文,重命名为 ASCII)
          dmg="$(find "$BUNDLE/dmg" -maxdepth 1 -name '*.dmg' 2>/dev/null | head -1 || true)"
          if [ -n "$dmg" ]; then
            cp "$dmg" "$OUT/GrowGuard-${VERSION}.dmg"
          fi

          # .app 打成 zip 兜底(dmg 偶发失败时仍有可分发的 App)
          app="$(find "$BUNDLE/macos" -maxdepth 1 -name '*.app' 2>/dev/null | head -1 || true)"
          if [ -n "$app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$app" "$OUT/GrowGuard-${VERSION}-app.zip"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "生成的发布产物(版本 $VERSION):"
          ls -lh "$OUT"

      - name: Upload build artifacts (CI)
        uses: actions/upload-artifact@v4
        with:
          name: growguard-macos
          path: release-artifacts/*
          if-no-files-found: error

      # --- 创建/更新 Release 并挂附件 ---
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          # tag 触发用触发的 tag;手动触发用 tauri.conf.json 版本组成的 v<版本>
          tag_name: v${{ steps.collect.outputs.version }}
          name: v${{ steps.collect.outputs.version }}
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(steps.collect.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            ## 安装

            **未签名版本** —— 首次打开会被 macOS Gatekeeper 拦截,右键点 App 选「打开」即可放行(或在「系统设置 → 隐私与安全性」点「仍要打开」)。

            | 产物 | 说明 |
            |------|------|
            | `GrowGuard-*.pkg` | **推荐**。双击引导安装 App + CLI + 后端;装完运行 `sudo grow-guard install` 起守护进程 |
            | `GrowGuard-*.dmg` | 仅桌面 App,拖拽到「应用程序」;CLI/守护需另装 |
            | `GrowGuard-*-app.zip` | `.app` 压缩包(dmg 兜底) |

            详见仓库内 [`docs/INSTALL.md`](../blob/v${{ steps.collect.outputs.version }}/docs/INSTALL.md)。
