<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>青锁盾</title>
    <style>
      :root {
        --bg1: #0f283a;
        --bg2: #16324a;
        --accent: #42b883;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
        color: #eaf2f8;
        background: radial-gradient(circle at 50% 35%, var(--bg2), var(--bg1) 70%);
        user-select: none;
        cursor: none;
      }
      .card {
        text-align: center;
        max-width: 640px;
        padding: 0 40px;
        animation: rise 0.4s ease both;
      }
      @keyframes rise {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: none; }
      }
      .lock {
        font-size: 84px;
        line-height: 1;
        margin-bottom: 28px;
        filter: drop-shadow(0 6px 20px rgba(66, 184, 131, 0.35));
      }
      .app-name {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 14px;
      }
      .reason {
        font-size: 20px;
        color: #9fc0d4;
        margin-bottom: 40px;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        letter-spacing: 3px;
        color: var(--accent);
        text-transform: uppercase;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
      }
      .hint {
        margin-top: 34px;
        font-size: 13px;
        color: #6f90a4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="lock">&#128274;</div>
      <div class="app-name" id="appName">该应用已被禁用</div>
      <div class="reason" id="reason">当前应用受青锁盾保护，暂不可用</div>
      <div class="brand"><span class="dot"></span>青锁盾 · GROW GUARD</div>
      <div class="hint">如需解除，请让家长在青锁盾中操作</div>
    </div>
    <script type="module">
      import { listen } from "@tauri-apps/api/event";
      const nameEl = document.getElementById("appName");
      const reasonEl = document.getElementById("reason");
      listen("overlay://block", (e) => {
        const p = e.payload || {};
        nameEl.textContent = p.app_name || "该应用已被禁用";
        reasonEl.textContent = p.reason || "当前应用受青锁盾保护，暂不可用";
      });
    </script>
  </body>
</html>
